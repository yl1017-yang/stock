<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Theme Analyzer | Premium Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 외부 스타일시트 연결 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Stock Theme Analyzer</h1>
        <div class="update-info">
            <div class="pulse"></div>
            Last Scanned: <span id="update-time-val">-</span>
        </div>
    </header>

    <div class="controls">
        <button class="filter-btn active" onclick="filterData('All')">전체보기</button>
        <button class="filter-btn" onclick="filterData('Pass')">수익종목만</button>
    </div>

    <div id="loading">분석 데이터를 불러오는 중...</div>
    <div id="error">
        <h3>데이터를 불러올 수 없습니다.</h3>
        <p>파이썬 프로그램이 먼저 실행되어 'data.json' 파일이 생성되어야 합니다.</p>
    </div>

    <div class="dashboard-grid" id="dashboard-items"></div>

    <footer>
        &copy; 2026 Stock Analyzer Project. All rights reserved.<br>
        <small>Powered by Python & Modern JavaScript</small>
    </footer>

    <!-- 외부 스크립트 연결 -->
    <script src="script.js"></script>
</body>
</html>
